services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 4000
      DATA_FILE_PATH: /app/backend/data/db.json
    ports:
      - "4000:4000"
    volumes:
      - crm_data:/app/backend/data

  reminder:
    build:
      context: .
      dockerfile: reminder/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 4001
      BACKEND_INTERNAL_URL: http://backend:4000
    depends_on:
      - backend
    ports:
      - "4001:4001"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_INTERNAL_URL: http://backend:4000
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:4000
        REMINDER_INTERNAL_URL: http://reminder:4001
    env_file:
      - .env
    environment:
      PORT: 3000
      BACKEND_INTERNAL_URL: http://backend:4000
      REMINDER_INTERNAL_URL: http://reminder:4001
    depends_on:
      - backend
      - reminder
    ports:
      - "3000:3000"

volumes:
  crm_data:
