services:
  postgres:
    image: postgres:16-alpine
    networks:
      - crm
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  oidc:
    image: ghcr.io/dexidp/dex:latest
    profiles:
      - e2e
    networks:
      - crm
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./e2e/dex/config.yaml:/etc/dex/config.yaml:ro
    ports:
      - "5556:5556"

  minio:
    image: minio/minio:latest
    profiles:
      - storage
    networks:
      - crm
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: crm
      MINIO_ROOT_PASSWORD: crmcrmcrm
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - crm
    env_file:
      - .env
    environment:
      PORT: 4000
      DATABASE_URL: postgres://crm:crm@postgres:5432/crm
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  reminder:
    build:
      context: .
      dockerfile: reminder/Dockerfile
    networks:
      - crm
    env_file:
      - .env
    environment:
      PORT: 4001
      BACKEND_INTERNAL_URL: http://backend:4000
    depends_on:
      - backend
    ports:
      - "4001:4001"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    networks:
      - crm
    env_file:
      - .env
    environment:
      BACKEND_INTERNAL_URL: http://backend:4000
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:4000
        REMINDER_INTERNAL_URL: http://reminder:4001
    networks:
      - crm
    env_file:
      - .env
    environment:
      PORT: 3000
      BACKEND_INTERNAL_URL: http://backend:4000
      REMINDER_INTERNAL_URL: http://reminder:4001
    depends_on:
      - backend
      - reminder
    ports:
      - "3000:3000"

volumes:
  pg_data:
  minio_data:

networks:
  crm:
    name: crm
