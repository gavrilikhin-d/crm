# Build images in GitHub Actions, push to ECR, deploy to Kubernetes via Helm.
# Runs on main pushes or manual dispatch.
#
# GitHub secrets (Environment: prod — Settings → Environments → prod):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY — IAM user: ECR push + SSM SendCommand
#   EC2_INSTANCE_ID — k3s host instance
#   EC2_DEPLOY_USER — optional, default ec2-user
#   SENTRY_AUTH_TOKEN — source map uploads (optional)
#   NEXT_PUBLIC_SENTRY_DSN, NEXT_PUBLIC_BACKEND_WS_URL, SENTRY_PROJECT — optional frontend build args
#   BACKEND_SENTRY_PROJECT, BOT_SENTRY_PROJECT, REMINDER_SENTRY_PROJECT — optional service source maps
#   SENTRY_RELEASE is set from the deploy commit SHA for source map uploads
#
# GitHub variables (optional):
#   KUBE_NAMESPACE — default crm
#   HELM_RELEASE — default crm
#   KUBE_INGRESS_HOST — default vocalcrm.site
#   SENTRY_ORG — Sentry organization slug for source map uploads
#   NEXT_PUBLIC_TELEGRAM_BOT_USERNAME — frontend Telegram connect links

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".cursor/**"
      - ".agents/**"
      - "AGENTS.md"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  ECR_IMAGE_PREFIX: gavrilikhin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
      image_registry: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_IMAGE_PREFIX }}

    steps:
      - name: Resolve deploy commit
        id: meta
        run: |
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        env:
          ECR_PREFIX: ${{ env.ECR_IMAGE_PREFIX }}
        run: |
          for repo in crm-backend crm-frontend crm-bot crm-reminder crm-migrate; do
            name="${ECR_PREFIX}/${repo}"
            aws ecr describe-repositories --repository-names "$name" >/dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$name"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create CI env stub
        run: |
          # compose validates env_file paths even when only building a subset of services
          cat > .env <<'EOF'
          DOMAIN=fake.example.com
          POSTGRES_USER=fake
          POSTGRES_PASSWORD=fake
          POSTGRES_DB=fake
          EOF

      - name: Build and push images
        env:
          CRM_IMAGE_REGISTRY: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_IMAGE_PREFIX }}
          CRM_IMAGE_TAG: ${{ steps.meta.outputs.sha }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG || vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT || vars.SENTRY_PROJECT }}
          BACKEND_SENTRY_PROJECT: ${{ secrets.BACKEND_SENTRY_PROJECT || 'backend' }}
          BOT_SENTRY_PROJECT: ${{ secrets.BOT_SENTRY_PROJECT || 'bot' }}
          REMINDER_SENTRY_PROJECT: ${{ secrets.REMINDER_SENTRY_PROJECT || 'reminder' }}
          SENTRY_RELEASE: ${{ steps.meta.outputs.sha }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_BACKEND_WS_URL: ${{ vars.NEXT_PUBLIC_BACKEND_WS_URL }}
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${{ vars.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME || 'VocalLessonBot' }}
          # Placeholders only — compose parses postgres/caddy too; real values live in EC2 .env
          DOMAIN: fake.example.com
          POSTGRES_USER: fake
          POSTGRES_PASSWORD: fake
          POSTGRES_DB: fake
        run: |
          docker buildx bake -f docker-compose.prod.yml --push \
            --set backend.cache-from=type=gha,scope=crm-backend \
            --set backend.cache-to=type=gha,scope=crm-backend,mode=max \
            --set frontend.cache-from=type=gha,scope=crm-frontend \
            --set frontend.cache-to=type=gha,scope=crm-frontend,mode=max \
            --set bot.cache-from=type=gha,scope=crm-bot \
            --set bot.cache-to=type=gha,scope=crm-bot,mode=max \
            --set reminder.cache-from=type=gha,scope=crm-reminder \
            --set reminder.cache-to=type=gha,scope=crm-reminder,mode=max \
            --set migrate.cache-from=type=gha,scope=crm-migrate \
            --set migrate.cache-to=type=gha,scope=crm-migrate,mode=max \
            backend frontend bot reminder migrate

  upload-source-maps:
    needs: [build-and-push]
    if: always() && needs.build-and-push.result == 'success'
    continue-on-error: true
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.build-and-push.outputs.image_tag }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.10

      - name: Install Sentry CLI dependency
        run: bun install --frozen-lockfile

      - name: Upload source maps to Sentry
        env:
          CRM_IMAGE_REGISTRY: ${{ needs.build-and-push.outputs.image_registry }}
          CRM_IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG || vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT || vars.SENTRY_PROJECT }}
          BACKEND_SENTRY_PROJECT: ${{ secrets.BACKEND_SENTRY_PROJECT || 'backend' }}
          BOT_SENTRY_PROJECT: ${{ secrets.BOT_SENTRY_PROJECT || 'bot' }}
          REMINDER_SENTRY_PROJECT: ${{ secrets.REMINDER_SENTRY_PROJECT || 'reminder' }}
          SENTRY_RELEASE: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ] || [ -z "${SENTRY_ORG:-}" ] || [ -z "${SENTRY_RELEASE:-}" ]; then
            echo "Skipping source map upload; SENTRY_AUTH_TOKEN, SENTRY_ORG, or SENTRY_RELEASE is missing."
            exit 0
          fi

          shopt -s globstar nullglob

          copy_from_image() {
            service="$1"
            image="$2"
            source_path="$3"
            output_dir="sentry-artifacts/$service"

            rm -rf "$output_dir"
            mkdir -p "$output_dir"

            docker pull "$image"
            container_id="$(docker create "$image")"
            docker cp "$container_id:$source_path" "$output_dir/"
            docker rm "$container_id"
          }

          copy_frontend_sourcemaps() {
            image="$1"
            output_dir="sentry-artifacts/frontend/.next"

            rm -rf "sentry-artifacts/frontend"
            mkdir -p "$output_dir"

            docker pull "$image"
            container_id="$(docker create "$image")"
            docker cp "$container_id:/app/frontend/.next/static" "$output_dir/" || true
            docker cp "$container_id:/app/frontend/.next/server" "$output_dir/" || true
            docker rm "$container_id"
          }

          upload_sourcemaps() {
            service="$1"
            project="$2"
            source_dir="$3"

            if [ -z "${project:-}" ]; then
              echo "Skipping $service source maps; Sentry project is not set."
              return
            fi

            maps=("$source_dir"/**/*.map)
            if [ "${#maps[@]}" -eq 0 ]; then
              echo "Skipping $service source maps; no .map files found in $source_dir."
              return
            fi

            ./node_modules/.bin/sentry-cli sourcemaps upload \
              --org "$SENTRY_ORG" \
              --project "$project" \
              --release "$SENTRY_RELEASE" \
              "$source_dir"
          }

          copy_from_image backend "$CRM_IMAGE_REGISTRY/crm-backend:$CRM_IMAGE_TAG" /app/backend/dist
          upload_sourcemaps backend "$BACKEND_SENTRY_PROJECT" sentry-artifacts/backend

          copy_from_image bot "$CRM_IMAGE_REGISTRY/crm-bot:$CRM_IMAGE_TAG" /app/bot/dist
          upload_sourcemaps bot "$BOT_SENTRY_PROJECT" sentry-artifacts/bot

          copy_from_image reminder "$CRM_IMAGE_REGISTRY/crm-reminder:$CRM_IMAGE_TAG" /app/reminder/dist
          upload_sourcemaps reminder "$REMINDER_SENTRY_PROJECT" sentry-artifacts/reminder

          copy_frontend_sourcemaps "$CRM_IMAGE_REGISTRY/crm-frontend:$CRM_IMAGE_TAG"
          upload_sourcemaps frontend "$SENTRY_PROJECT" sentry-artifacts/frontend

  deploy:
    needs: [build-and-push]
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/crm -f deploy/helm/crm/values-small.yaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM Helm
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          EC2_DEPLOY_USER: ${{ secrets.EC2_DEPLOY_USER }}
          DEPLOY_SHA: ${{ needs.build-and-push.outputs.image_tag }}
          CRM_IMAGE_REGISTRY: ${{ needs.build-and-push.outputs.image_registry }}
          KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'crm' }}
          HELM_RELEASE: ${{ vars.HELM_RELEASE || 'crm' }}
          KUBE_INGRESS_HOST: ${{ vars.KUBE_INGRESS_HOST || 'vocalcrm.site' }}
        run: |
          if [ -z "${EC2_INSTANCE_ID:-}" ]; then
            echo "::error::EC2_INSTANCE_ID is not set in the prod environment secrets"
            exit 1
          fi

          chmod +x deploy/ssm-from-ci.sh
          deploy/ssm-from-ci.sh \
            "$EC2_INSTANCE_ID" \
            "$DEPLOY_SHA" \
            main \
            "$AWS_REGION" \
            "${EC2_DEPLOY_USER:-ec2-user}" \
            "$CRM_IMAGE_REGISTRY" \
            "$KUBE_NAMESPACE" \
            "$HELM_RELEASE" \
            "$KUBE_INGRESS_HOST"

      - name: Print rollback fallback
        if: failure()
        env:
          KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'crm' }}
          HELM_RELEASE: ${{ vars.HELM_RELEASE || 'crm' }}
        run: |
          echo "Helm deploy uses --atomic, so failed upgrades should roll back automatically."
          echo "If you need a manual fallback, run from the EC2 host: helm rollback $HELM_RELEASE --namespace $KUBE_NAMESPACE"
