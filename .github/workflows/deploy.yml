# Build images in GitHub Actions, push to ECR, deploy to Kubernetes via Helm.
# Runs on main pushes or manual dispatch.
#
# GitHub secrets (Environment: prod — Settings → Environments → prod):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY — IAM user: ECR push
#   KUBE_CONFIG_B64 — base64-encoded kubeconfig for the target cluster
#   SENTRY_AUTH_TOKEN — source map uploads (optional)
#   NEXT_PUBLIC_SENTRY_DSN, SENTRY_ORG, SENTRY_PROJECT — optional frontend build args
#   BACKEND_SENTRY_PROJECT, BOT_SENTRY_PROJECT, REMINDER_SENTRY_PROJECT — optional service source maps
#   SENTRY_RELEASE is set from the deploy commit SHA for source map uploads
#
# GitHub variables (optional):
#   KUBE_NAMESPACE — default crm
#   HELM_RELEASE — default crm
#   KUBE_INGRESS_HOST — default vocalcrm.site

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  ECR_IMAGE_PREFIX: gavrilikhin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
      image_registry: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_IMAGE_PREFIX }}

    steps:
      - name: Resolve deploy commit
        id: meta
        run: |
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        env:
          ECR_PREFIX: ${{ env.ECR_IMAGE_PREFIX }}
        run: |
          for repo in crm-backend crm-frontend crm-bot crm-reminder crm-migrate; do
            name="${ECR_PREFIX}/${repo}"
            aws ecr describe-repositories --repository-names "$name" >/dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$name"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create CI env stub
        run: |
          # compose validates env_file paths even when only building a subset of services
          cat > .env <<'EOF'
          DOMAIN=fake.example.com
          POSTGRES_USER=fake
          POSTGRES_PASSWORD=fake
          POSTGRES_DB=fake
          EOF

      - name: Build and push images
        env:
          CRM_IMAGE_REGISTRY: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_IMAGE_PREFIX }}
          CRM_IMAGE_TAG: ${{ steps.meta.outputs.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          BACKEND_SENTRY_PROJECT: ${{ secrets.BACKEND_SENTRY_PROJECT || 'backend' }}
          BOT_SENTRY_PROJECT: ${{ secrets.BOT_SENTRY_PROJECT || 'bot' }}
          REMINDER_SENTRY_PROJECT: ${{ secrets.REMINDER_SENTRY_PROJECT || 'reminder' }}
          SENTRY_RELEASE: ${{ steps.meta.outputs.sha }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          # Placeholders only — compose parses postgres/caddy too; real values live in EC2 .env
          DOMAIN: fake.example.com
          POSTGRES_USER: fake
          POSTGRES_PASSWORD: fake
          POSTGRES_DB: fake
        run: |
          docker compose -f docker-compose.prod.yml build backend frontend bot reminder migrate
          docker compose -f docker-compose.prod.yml push backend frontend bot reminder migrate

  deploy:
    needs: [build-and-push]
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ -z "${KUBE_CONFIG_B64:-}" ]; then
            echo "::error::KUBE_CONFIG_B64 is not set in the prod environment secrets"
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Lint Helm chart
        run: helm lint deploy/helm/crm -f deploy/helm/crm/values-small.yaml

      - name: Deploy via Helm
        env:
          DEPLOY_SHA: ${{ needs.build-and-push.outputs.image_tag }}
          CRM_IMAGE_REGISTRY: ${{ needs.build-and-push.outputs.image_registry }}
          KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'crm' }}
          HELM_RELEASE: ${{ vars.HELM_RELEASE || 'crm' }}
          KUBE_INGRESS_HOST: ${{ vars.KUBE_INGRESS_HOST || 'vocalcrm.site' }}
        run: |
          helm upgrade --install "$HELM_RELEASE" deploy/helm/crm \
            --namespace "$KUBE_NAMESPACE" \
            --create-namespace \
            -f deploy/helm/crm/values-small.yaml \
            --set global.imageRegistry="$CRM_IMAGE_REGISTRY" \
            --set global.imageTag="$DEPLOY_SHA" \
            --set ingress.host="$KUBE_INGRESS_HOST" \
            --set config.appBaseUrl="https://$KUBE_INGRESS_HOST" \
            --set config.authUrl="https://$KUBE_INGRESS_HOST" \
            --atomic \
            --wait \
            --timeout 10m

      - name: Verify rollouts
        env:
          KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'crm' }}
          HELM_RELEASE: ${{ vars.HELM_RELEASE || 'crm' }}
        run: |
          kubectl rollout status "deployment/${HELM_RELEASE}-crm-backend" --namespace "$KUBE_NAMESPACE" --timeout=5m
          kubectl rollout status "deployment/${HELM_RELEASE}-crm-frontend" --namespace "$KUBE_NAMESPACE" --timeout=5m
          kubectl rollout status "deployment/${HELM_RELEASE}-crm-reminder" --namespace "$KUBE_NAMESPACE" --timeout=5m
          kubectl rollout status "deployment/${HELM_RELEASE}-crm-bot" --namespace "$KUBE_NAMESPACE" --timeout=5m

      - name: Print rollback command
        if: failure()
        env:
          KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'crm' }}
          HELM_RELEASE: ${{ vars.HELM_RELEASE || 'crm' }}
        run: |
          echo "Rollback with: helm rollback $HELM_RELEASE --namespace $KUBE_NAMESPACE"
