# Build images in GitHub Actions, push to ECR, pull on EC2 via SSM.
# Runs only after the "Tests" workflow succeeds on main (or manual dispatch with tests).
#
# GitHub secrets (Environment: prod — Settings → Environments → prod):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY — IAM user: ECR push + SSM SendCommand
#   EC2_INSTANCE_ID — target instance (e.g. i-0abc123...)
#   EC2_DEPLOY_USER — optional, default ec2-user
#   SENTRY_AUTH_TOKEN — source map uploads (optional)
#   NEXT_PUBLIC_SENTRY_DSN, SENTRY_ORG, SENTRY_PROJECT — optional frontend build args
#   BACKEND_SENTRY_PROJECT, BOT_SENTRY_PROJECT, REMINDER_SENTRY_PROJECT — optional service source maps
#   SENTRY_RELEASE is set from the deploy commit SHA for source map uploads
#
# IAM user policy (in addition to ECR push) — SendCommand only, no DescribeInstanceInformation:
#   {
#     "Effect": "Allow",
#     "Action": ["ssm:SendCommand", "ssm:GetCommandInvocation"],
#     "Resource": [
#       "arn:aws:ec2:eu-central-1:982081063376:instance/i-0d217068bb9981687",
#       "arn:aws:ssm:eu-central-1::document/AWS-RunShellScript",
#       "arn:aws:ssm:eu-central-1:982081063376:*"
#     ]
#   }
#
# EC2 one-time setup:
#   - IAM instance role: AmazonSSMManagedInstanceCore + AmazonEC2ContainerRegistryReadOnly
#   - SSM agent running (preinstalled on Amazon Linux 2023)
#   - No inbound SSH required for deploy
#   - ~/crm cloned from git with .env including CRM_IMAGE_REGISTRY

name: Deploy

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  ECR_IMAGE_PREFIX: gavrilikhin

jobs:
  test:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm
          POSTGRES_DB: crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm -d crm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://crm:crm@localhost:5432/crm_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgres://crm:crm@localhost:5432/crm_test
        run: bun run db:migrate

      - name: Run tests
        env:
          DATABASE_URL: postgres://crm:crm@localhost:5432/crm_test
        run: bun test

  build-and-push:
    needs: [test]
    if: >
      always() &&
      (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && needs.test.result == 'success')
      )
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}

    steps:
      - name: Resolve deploy commit
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        env:
          ECR_PREFIX: ${{ env.ECR_IMAGE_PREFIX }}
        run: |
          for repo in crm-backend crm-frontend crm-bot crm-reminder crm-migrate; do
            name="${ECR_PREFIX}/${repo}"
            aws ecr describe-repositories --repository-names "$name" >/dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$name"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI env stub
        run: |
          # compose validates env_file paths even when only building a subset of services
          cat > .env <<'EOF'
          DOMAIN=fake.example.com
          POSTGRES_USER=fake
          POSTGRES_PASSWORD=fake
          POSTGRES_DB=fake
          EOF

      - name: Build and push images
        env:
          CRM_IMAGE_REGISTRY: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_IMAGE_PREFIX }}
          CRM_IMAGE_TAG: ${{ steps.meta.outputs.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          BACKEND_SENTRY_PROJECT: ${{ secrets.BACKEND_SENTRY_PROJECT || 'backend' }}
          BOT_SENTRY_PROJECT: ${{ secrets.BOT_SENTRY_PROJECT || 'bot' }}
          REMINDER_SENTRY_PROJECT: ${{ secrets.REMINDER_SENTRY_PROJECT || 'reminder' }}
          SENTRY_RELEASE: ${{ steps.meta.outputs.sha }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          # Placeholders only — compose parses postgres/caddy too; real values live in EC2 .env
          DOMAIN: fake.example.com
          POSTGRES_USER: fake
          POSTGRES_PASSWORD: fake
          POSTGRES_DB: fake
        run: |
          docker compose -f docker-compose.prod.yml build backend frontend bot reminder migrate
          docker compose -f docker-compose.prod.yml push backend frontend bot reminder migrate

  deploy:
    needs: [build-and-push]
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          EC2_DEPLOY_USER: ${{ secrets.EC2_DEPLOY_USER }}
          DEPLOY_SHA: ${{ needs.build-and-push.outputs.image_tag }}
          DEPLOY_REF: main
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          if [ -z "${EC2_INSTANCE_ID:-}" ]; then
            echo "::error::EC2_INSTANCE_ID is not set in the prod environment secrets"
            exit 1
          fi
          chmod +x deploy/ssm-from-ci.sh
          deploy/ssm-from-ci.sh \
            "$EC2_INSTANCE_ID" \
            "$DEPLOY_SHA" \
            "$DEPLOY_REF" \
            "$AWS_REGION" \
            "${EC2_DEPLOY_USER:-ec2-user}"
