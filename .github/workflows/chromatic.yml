name: Chromatic

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  chromatic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${{ vars.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME || 'VocalLessonBot' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to Chromatic for review
        if: github.event_name == 'pull_request'
        run: bun run chromatic --only-changed

      - name: Publish and accept Chromatic baseline
        if: github.event_name != 'pull_request'
        run: bun run chromatic --auto-accept-changes main
