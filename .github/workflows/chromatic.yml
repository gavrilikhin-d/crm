name: Chromatic

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  chromatic:
    runs-on: ubuntu-latest
    environment: chromatic
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Chromatic token
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          if [ -z "$CHROMATIC_PROJECT_TOKEN" ]; then
            echo "::error::Missing CHROMATIC_PROJECT_TOKEN repository secret."
            exit 1
          fi

      - name: Publish to Chromatic for review
        if: github.event_name == 'pull_request'
        working-directory: frontend
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${{ vars.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME || 'VocalLessonBot' }}
        run: bunx chromatic --only-changed

      - name: Publish and accept Chromatic baseline
        if: github.event_name != 'pull_request'
        working-directory: frontend
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${{ vars.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME || 'VocalLessonBot' }}
        run: bunx chromatic --auto-accept-changes main
