name: Tests

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_tests: ${{ steps.check.outputs.run_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect code-related changes
        id: check
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # Skip the suite only when every changed file is docs/config noise.
          # Any other path (app code, workflows, lockfiles, etc.) runs tests.
          if git diff --name-only "$BASE" "$HEAD" | grep -qvE \
            '(\.md$|^LICENSE$|^\.gitignore$|^\.cursor/|^\.agents/|^AGENTS\.md$)'; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "Code-related changes detected; tests will run."
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only (or empty) changes; tests will be skipped."
          fi

  test-run:
    needs: changes
    if: needs.changes.outputs.run_tests == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm
          POSTGRES_DB: crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm -d crm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://crm:crm@localhost:5432/crm_test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgres://crm:crm@localhost:5432/crm_test
        run: bun run db:migrate

      - name: Run tests
        env:
          DATABASE_URL: postgres://crm:crm@localhost:5432/crm_test
        run: bun run test

      - name: Install Playwright browsers
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: Run e2e tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore

  # Job id stays `test` so required checks named "Tests / test" still work on docs-only PRs.
  test:
    needs: [changes, test-run]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Evaluate test outcome
        run: |
          if [ "${{ needs.changes.outputs.run_tests }}" != "true" ]; then
            echo "Skipped tests (no code-related changes)."
            exit 0
          fi
          if [ "${{ needs['test-run'].result }}" = "success" ]; then
            exit 0
          fi
          echo "test-run result: ${{ needs['test-run'].result }}"
          exit 1
