global:
  imageRegistry: ""
  imageTag: dev
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

config:
  appBaseUrl: "https://vocalcrm.site"
  appTimezone: "Europe/Minsk"
  authUrl: "https://vocalcrm.site"
  logLevel: "info"
  lessonReminderMinutes: "1440,120"
  telegramBotUsername: "VocalLessonBot"
  sentryEnvironment: "production"
  nextPublicSentryDsn: ""

secrets:
  # Create this secret outside Helm, or wire it through External Secrets later.
  # Expected keys include DATABASE_URL, AUTH_SECRET, AUTH_SYNC_SECRET,
  # AUTH_GOOGLE_ID, AUTH_GOOGLE_SECRET, INTERNAL_API_TOKEN, TELEGRAM_BOT_TOKEN,
  # SENTRY_DSN, BACKEND_SENTRY_DSN, BOT_SENTRY_DSN, and REMINDER_SENTRY_DSN.
  existingSecret: crm-secrets

database:
  urlSecretKey: DATABASE_URL

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: crm-frontend
  port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 160Mi
    limits:
      cpu: 500m
      memory: 384Mi

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: crm-backend
  port: 4000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /app/backend/data

reminder:
  enabled: true
  replicaCount: 1
  image:
    repository: crm-reminder
  port: 4001
  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 192Mi

bot:
  enabled: true
  replicaCount: 1
  image:
    repository: crm-bot
  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 192Mi

migrate:
  enabled: true
  image:
    repository: crm-migrate
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: vocalcrm.site
  tls:
    enabled: true
    secretName: vocalcrm-site-tls

certManager:
  clusterIssuer:
    enabled: true
    name: letsencrypt-prod
    email: ""
    server: https://acme-v02.api.letsencrypt.org/directory
    ingressClassName: traefik

rollout:
  maxUnavailable: 0
  maxSurge: 1
  minReadySeconds: 5
  terminationGracePeriodSeconds: 30
