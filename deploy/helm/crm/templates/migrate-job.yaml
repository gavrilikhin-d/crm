{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "crm.fullname" . }}-migrate
  labels:
    {{- include "crm.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "crm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      {{- include "crm.imagePullSecrets" . | nindent 6 }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "crm.image" (list . .Values.migrate) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- include "crm.envFrom" . | nindent 10 }}
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.database.urlSecretKey }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
{{- end }}
