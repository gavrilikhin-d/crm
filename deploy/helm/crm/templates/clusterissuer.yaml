{{- if .Values.certManager.clusterIssuer.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuer.name | quote }}
  labels:
    {{- include "crm.labels" . | nindent 4 }}
spec:
  acme:
    email: {{ required "certManager.clusterIssuer.email is required when certManager.clusterIssuer.enabled=true" .Values.certManager.clusterIssuer.email | quote }}
    server: {{ .Values.certManager.clusterIssuer.server | quote }}
    privateKeySecretRef:
      name: {{ printf "%s-account-key" .Values.certManager.clusterIssuer.name | quote }}
    solvers:
      - http01:
          ingress:
            class: {{ .Values.certManager.clusterIssuer.ingressClassName | quote }}
{{- end }}
