{{- if .Values.bot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crm.fullname" . }}-bot
  labels:
    {{- include "crm.labels" . | nindent 4 }}
    app.kubernetes.io/component: bot
spec:
  replicas: {{ .Values.bot.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "crm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: bot
  template:
    metadata:
      labels:
        {{- include "crm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bot
    spec:
      {{- include "crm.imagePullSecrets" . | nindent 6 }}
      terminationGracePeriodSeconds: {{ .Values.rollout.terminationGracePeriodSeconds }}
      containers:
        - name: bot
          image: {{ include "crm.image" (list . .Values.bot) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.bot.port }}
          {{- include "crm.envFrom" . | nindent 10 }}
          env:
            - name: NODE_ENV
              value: production
            - name: BOT_PORT
              value: {{ .Values.bot.port | quote }}
            - name: BACKEND_INTERNAL_URL
              value: http://{{ include "crm.fullname" . }}-backend:{{ .Values.backend.port }}
            - name: SENTRY_RELEASE
              value: {{ .Values.global.imageTag | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.bot.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "crm.fullname" . }}-bot
  labels:
    {{- include "crm.labels" . | nindent 4 }}
    app.kubernetes.io/component: bot
spec:
  type: ClusterIP
  selector:
    {{- include "crm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: bot
  ports:
    - name: http
      port: {{ .Values.bot.port }}
      targetPort: http
{{- end }}
