apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "crm.fullname" . }}-config
  labels:
    {{- include "crm.labels" . | nindent 4 }}
data:
  APP_BASE_URL: {{ .Values.config.appBaseUrl | quote }}
  APP_TIMEZONE: {{ .Values.config.appTimezone | quote }}
  AUTH_URL: {{ .Values.config.authUrl | quote }}
  LESSON_REMINDER_MINUTES: {{ .Values.config.lessonReminderMinutes | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: {{ .Values.config.telegramBotUsername | quote }}
  NEXT_PUBLIC_SENTRY_DSN: {{ .Values.config.nextPublicSentryDsn | quote }}
  SENTRY_ENVIRONMENT: {{ .Values.config.sentryEnvironment | quote }}
