{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crm.fullname" . }}-frontend
  labels:
    {{- include "crm.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  minReadySeconds: {{ .Values.rollout.minReadySeconds }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollout.maxUnavailable }}
      maxSurge: {{ .Values.rollout.maxSurge }}
  selector:
    matchLabels:
      {{- include "crm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "crm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- include "crm.imagePullSecrets" . | nindent 6 }}
      terminationGracePeriodSeconds: {{ .Values.rollout.terminationGracePeriodSeconds }}
      containers:
        - name: frontend
          image: {{ include "crm.image" (list . .Values.frontend) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
          {{- include "crm.envFrom" . | nindent 10 }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.frontend.port | quote }}
            - name: HOSTNAME
              value: 0.0.0.0
            - name: BACKEND_INTERNAL_URL
              value: http://{{ include "crm.fullname" . }}-backend:{{ .Values.backend.port }}
            - name: REMINDER_INTERNAL_URL
              value: http://{{ include "crm.fullname" . }}-reminder:{{ .Values.reminder.port }}
            - name: SENTRY_RELEASE
              value: {{ .Values.global.imageTag | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "crm.fullname" . }}-frontend
  labels:
    {{- include "crm.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "crm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.port }}
      targetPort: http
{{- end }}
