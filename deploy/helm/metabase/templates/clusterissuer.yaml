{{- if .Values.certManager.clusterIssuer.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuer.name | quote }}
spec:
  acme:
    email: {{ required "certManager.clusterIssuer.email is required when certManager.clusterIssuer.enabled is true" .Values.certManager.clusterIssuer.email | quote }}
    server: {{ .Values.certManager.clusterIssuer.server | quote }}
    privateKeySecretRef:
      name: {{ .Values.certManager.clusterIssuer.name | quote }}
    solvers:
      - http01:
          ingress:
            ingressClassName: {{ .Values.certManager.clusterIssuer.ingressClassName | quote }}
{{- end }}
