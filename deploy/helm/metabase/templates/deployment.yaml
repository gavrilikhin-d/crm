apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "metabase.fullname" . }}
  labels:
    {{- include "metabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: metabase
spec:
  replicas: {{ .Values.replicaCount }}
  minReadySeconds: {{ .Values.rollout.minReadySeconds }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "metabase.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: metabase
  template:
    metadata:
      labels:
        {{- include "metabase.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: metabase
    spec:
      terminationGracePeriodSeconds: {{ .Values.rollout.terminationGracePeriodSeconds }}
      containers:
        - name: metabase
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          env:
            - name: MB_JETTY_HOST
              value: 0.0.0.0
            - name: MB_JETTY_PORT
              value: {{ .Values.port | quote }}
            - name: MB_SITE_NAME
              value: {{ .Values.site.name | quote }}
            - name: MB_SITE_URL
              value: {{ printf "https://%s" .Values.ingress.host | quote }}
            - name: JAVA_TIMEZONE
              value: {{ .Values.site.timezone | quote }}
            - name: MB_ENCRYPTION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.encryptionSecretKey }}
            - name: MB_DB_TYPE
              value: postgres
            - name: MB_DB_HOST
              value: {{ include "metabase.appDbHost" . | quote }}
            - name: MB_DB_PORT
              value: {{ .Values.appDatabase.port | quote }}
            - name: MB_DB_DBNAME
              value: {{ .Values.appDatabase.name | quote }}
            - name: MB_DB_USER
              value: {{ .Values.appDatabase.user | quote }}
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.appDbPasswordKey }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "metabase.fullname" . }}
  labels:
    {{- include "metabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: metabase
spec:
  type: ClusterIP
  selector:
    {{- include "metabase.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: metabase
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: http
