<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRM преподавателя</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Мини-CRM</p>
        <h1>Кабинет преподавателя</h1>
      </div>
      <button id="refreshButton" type="button">Обновить</button>
    </header>

    <main>
      <section class="grid grid-4" id="dashboard"></section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Ученики</h2>
        </div>
        <form class="form-grid" id="studentForm">
          <input name="fullName" placeholder="ФИО" required />
          <input name="phone" placeholder="Телефон" required />
          <input name="telegramUsername" placeholder="Telegram username" />
          <input name="telegramChatId" placeholder="Telegram chat id" />
          <input name="defaultLessonPrice" type="number" min="0" placeholder="Цена разового занятия" />
          <button type="submit">Добавить ученика</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ученик</th>
                <th>Telegram</th>
                <th>Баланс</th>
                <th>Статус</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="studentsTable"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Расписание</h2>
        </div>
        <form class="form-grid" id="lessonForm">
          <input name="startsAt" type="datetime-local" required />
          <select name="lessonType" required>
            <option value="individual">Индивидуальное</option>
            <option value="group">Групповое</option>
          </select>
          <input name="durationMinutes" type="number" min="1" placeholder="Длительность, мин" />
          <select name="studentIds" multiple required id="lessonStudents"></select>
          <button type="submit">Создать занятие</button>
        </form>
        <div id="lessonsList" class="cards"></div>
      </section>

      <section class="grid grid-2">
        <div class="panel">
          <div class="panel-heading">
            <h2>Оплаты</h2>
          </div>
          <form class="form-grid" id="paymentForm">
            <select name="studentId" required id="paymentStudent"></select>
            <select name="packageId" id="paymentPackage"></select>
            <input name="lessonCount" type="number" min="1" placeholder="Занятий без пакета" />
            <input name="amount" type="number" min="0" placeholder="Сумма без пакета" />
            <select name="method" required>
              <option value="transfer">Перевод</option>
              <option value="cash">Наличные</option>
              <option value="other">Другое</option>
            </select>
            <button type="submit">Добавить оплату</button>
          </form>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Дата</th>
                  <th>Ученик</th>
                  <th>Занятий</th>
                  <th>Сумма</th>
                </tr>
              </thead>
              <tbody id="paymentsTable"></tbody>
            </table>
          </div>
        </div>

        <div class="panel">
          <div class="panel-heading">
            <h2>Пакеты</h2>
          </div>
          <form class="form-grid" id="packageForm">
            <input name="name" placeholder="Название пакета" required />
            <input name="lessonCount" type="number" min="1" placeholder="Количество занятий" required />
            <input name="price" type="number" min="0" placeholder="Цена пакета" required />
            <button type="submit">Добавить пакет</button>
          </form>
          <div id="packagesList" class="cards compact"></div>
        </div>
      </section>
    </main>

    <template id="emptyTemplate">
      <p class="empty">Пока нет данных.</p>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
