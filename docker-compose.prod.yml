# Production stack — only the reverse proxy is exposed on the host.
#
# Local build:
#   docker compose -f docker-compose.prod.yml build
#
# CI builds images and pushes to ECR; the server only pulls:
#   CRM_IMAGE_REGISTRY=982081063376.dkr.ecr.eu-central-1.amazonaws.com/gavrilikhin
#   CRM_IMAGE_TAG=<git-sha>
#
# Deploy:
#   docker compose -f docker-compose.prod.yml run --rm migrate
#   docker compose -f docker-compose.prod.yml up -d

name: crm-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - crm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-crm}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile.migrate
    image: ${CRM_IMAGE_REGISTRY:-local}/crm-migrate:${CRM_IMAGE_TAG:-dev}
    pull_policy: always
    networks:
      - crm
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - migrate

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${BACKEND_SENTRY_PROJECT:-backend}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    image: ${CRM_IMAGE_REGISTRY:-local}/crm-backend:${CRM_IMAGE_TAG:-dev}
    pull_policy: always
    restart: unless-stopped
    networks:
      - crm
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 4000
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      DATABASE_URL: postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm}
    volumes:
      - backend_data:/app/backend/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  reminder:
    build:
      context: .
      dockerfile: reminder/Dockerfile
      args:
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${REMINDER_SENTRY_PROJECT:-reminder}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    image: ${CRM_IMAGE_REGISTRY:-local}/crm-reminder:${CRM_IMAGE_TAG:-dev}
    pull_policy: always
    restart: unless-stopped
    networks:
      - crm
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 4001
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      BACKEND_INTERNAL_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "fetch('http://127.0.0.1:4001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
      args:
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${BOT_SENTRY_PROJECT:-bot}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    image: ${CRM_IMAGE_REGISTRY:-local}/crm-bot:${CRM_IMAGE_TAG:-dev}
    pull_policy: always
    restart: unless-stopped
    networks:
      - crm
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      BACKEND_INTERNAL_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:4000
        REMINDER_INTERNAL_URL: http://reminder:4001
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    image: ${CRM_IMAGE_REGISTRY:-local}/crm-frontend:${CRM_IMAGE_TAG:-dev}
    pull_policy: always
    restart: unless-stopped
    networks:
      - crm
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      BACKEND_INTERNAL_URL: http://backend:4000
      REMINDER_INTERNAL_URL: http://reminder:4001
    depends_on:
      backend:
        condition: service_healthy
      reminder:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    networks:
      - crm
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env, e.g. vocalcrm.site}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  pg_data:
  backend_data:
  caddy_data:
  caddy_config:

networks:
  crm:
    name: crm-prod
